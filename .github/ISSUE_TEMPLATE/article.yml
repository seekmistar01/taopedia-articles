name: Article
description: Request a new article or update to an existing article.
labels: ["article"]
body:
  - type: input
    id: title
    attributes:
      label: Article title
      placeholder: Dynamic TAO
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: What should the article cover?
      description: Keep the request specific and Bittensor-focused.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Link official docs, primary sources, or relevant references.
    validations:
      required: true
