name: Source Needed
description: Flag content that needs a citation or verification.
labels: ["source-needed"]
body:
  - type: input
    id: article
    attributes:
      label: Article
      placeholder: content/pages/staking_and_delegation/index.mdx
    validations:
      required: true
  - type: textarea
    id: claim
    attributes:
      label: Claim or section needing a source
    validations:
      required: true
  - type: textarea
    id: suggested_sources
    attributes:
      label: Suggested sources
