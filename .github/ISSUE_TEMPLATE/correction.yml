name: Correction
description: Report a factual issue or clarification.
labels: ["correction"]
body:
  - type: input
    id: article
    attributes:
      label: Article
      placeholder: content/pages/yuma_consensus/index.mdx
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What needs correction?
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: Link the source that supports the correction.
    validations:
      required: true
