name: Category
description: Request an article category or metadata change.
labels: ["category"]
body:
  - type: input
    id: article
    attributes:
      label: Article
      placeholder: content/pages/wallets/index.mdx
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Proposed category
      placeholder: Wallets
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Reason
    validations:
      required: true
