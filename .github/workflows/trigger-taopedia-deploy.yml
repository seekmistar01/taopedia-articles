name: Trigger Taopedia deploy

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "scripts/build-index.mjs"
      - "scripts/validate-content.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/trigger-taopedia-deploy.yml"

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
    steps:
      - name: Trigger production Netlify build
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "::notice::No production Netlify build hook configured."
            exit 0
          fi

          echo "Triggering Taopedia production deploy from taopedia-articles/main."
          curl -fsS -X POST "$NETLIFY_BUILD_HOOK"
