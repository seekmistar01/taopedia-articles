name: Image
description: Request an article image or media update.
labels: ["image"]
body:
  - type: input
    id: article
    attributes:
      label: Article
      placeholder: content/pages/dynamic_tao/index.mdx
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Image request
      description: Describe the image, diagram, or media needed.
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source or license
      description: Link the source and license if this is an existing image.
